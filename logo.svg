<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 54" width="210" height="54">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a90c4"/>
      <stop offset="100%" stop-color="#1a4171"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="54" height="54" rx="7"/>
    </clipPath>
  </defs>

  <!-- Icon badge -->
  <rect x="0" y="0" width="54" height="54" rx="7" fill="url(#iconGrad)"/>

  <!-- White mountains (back) -->
  <polygon points="6,44 20,20 34,44" fill="white" opacity="0.95" clip-path="url(#iconClip)"/>
  <polygon points="22,44 36,26 50,44" fill="white" opacity="0.75" clip-path="url(#iconClip)"/>

  <!-- Gold/yellow accent shape (checkmark / front hill) -->
  <polygon points="10,44 22,32 34,44" fill="#d4b94a" clip-path="url(#iconClip)"/>

  <!-- AVATAR text -->
  <text x="64" y="34" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="23" fill="#2E68A1" letter-spacing="1.5">AVATAR</text>

  <!-- Learning Center text -->
  <text x="66" y="48" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="11.5" fill="#5a7fa0" letter-spacing="1.2">Learning Center</text>
</svg>
